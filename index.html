<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracking System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Attendance Tracking System</h1>
            <p>Track and manage attendance records</p>
        </header>

        <div class="content">
            <div class="card">
                <h2>Add Person</h2>
                <form id="addPersonForm">
                    <div class="form-group">
                        <label for="personName">Name:</label>
                        <input type="text" id="personName" placeholder="Enter full name" required>
                    </div>
                    <div class="form-group">
                        <label for="personRole">Role:</label>
                        <input type="text" id="personRole" placeholder="e.g., Student, Employee">
                    </div>
                    <div class="form-group">
                        <label for="personLevel">Level (Class):</label>
                        <select id="personLevel" required>
                            <option value="">-- Select Level --</option>
                            <option value="Nursery 1">Nursery 1</option>
                            <option value="Nursery 2">Nursery 2</option>
                            <option value="Kindergarten 1">Kindergarten 1</option>
                            <option value="Kindergarten 2">Kindergarten 2</option>
                            <option value="Class 1">Class 1</option>
                            <option value="Class 2">Class 2</option>
                            <option value="Class 3">Class 3</option>
                            <option value="Class 4">Class 4</option>
                            <option value="Class 5">Class 5</option>
                            <option value="Class 6">Class 6</option>
                            <option value="Form 1">Form 1</option>
                            <option value="Form 2">Form 2</option>
                            <option value="Form 3">Form 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="personStream">Stream:</label>
                        <select id="personStream" required>
                            <option value="">-- Select Stream --</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="F">F</option>
                            <option value="G">G</option>
                            <option value="H">H</option>
                            <option value="I">I</option>
                            <option value="J">J</option>
                            <option value="K">K</option>
                            <option value="L">L</option>
                            <option value="M">M</option>
                            <option value="N">N</option>
                            <option value="O">O</option>
                            <option value="P">P</option>
                            <option value="Q">Q</option>
                            <option value="R">R</option>
                            <option value="S">S</option>
                            <option value="T">T</option>
                            <option value="U">U</option>
                            <option value="V">V</option>
                            <option value="W">W</option>
                            <option value="X">X</option>
                            <option value="Y">Y</option>
                            <option value="Z">Z</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Person</button>
                </form>
                <button id="toggleMembersBtn" class="btn btn-secondary" type="button" style="margin-top:20px;">Show Manage Members</button>
                <div id="membersPanel" class="members hidden">
                    <h3>Manage Members</h3>
                    <div class="form-group">
                        <label for="manageLevelSelect">Manage by Level:</label>
                        <select id="manageLevelSelect">
                            <option value="">-- Select Level --</option>
                        </select>
                    </div>
                    <div id="membersList"></div>
                </div>
            </div>

            <div class="card">
                <h2>Mark Attendance</h2>
                <form id="markAttendanceForm">
                    <div class="form-group">
                        <label for="attendanceLevel">Level:</label>
                        <select id="attendanceLevel" required>
                            <option value="">-- Select Level --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="personSelect">Select Person:</label>
                        <select id="personSelect" required>
                            <option value="">-- Choose a person --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="attendanceStream">Stream:</label>
                        <input type="text" id="attendanceStream" readonly placeholder="Stream will auto-populate">
                    </div>
                    <div class="form-group">
                        <label for="attendanceDate">Date:</label>
                        <input type="date" id="attendanceDate" required>
                    </div>
                    <div class="form-group">
                        <label for="attendanceStatus">Status:</label>
                        <select id="attendanceStatus" required>
                            <option value="">-- Select Status --</option>
                            <option value="present">Present</option>
                            <option value="absent">Absent</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Mark Attendance</button>
                </form>
            </div>

            <div class="card table-container">
                <h2>Attendance Records</h2>
                <div id="printHeader" class="print-header"></div>
                <div class="filters">
                    <div class="filter-group">
                        <label for="filterDate">Filter by Date:</label>
                        <input type="date" id="filterDate">
                    </div>
                    <div class="filter-group">
                        <label for="filterLevel">Filter by Level:</label>
                        <select id="filterLevel">
                            <option value="">All Levels</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterStream">Filter by Stream:</label>
                        <select id="filterStream">
                            <option value="">All Streams</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="F">F</option>
                            <option value="G">G</option>
                            <option value="H">H</option>
                            <option value="I">I</option>
                            <option value="J">J</option>
                            <option value="K">K</option>
                            <option value="L">L</option>
                            <option value="M">M</option>
                            <option value="N">N</option>
                            <option value="O">O</option>
                            <option value="P">P</option>
                            <option value="Q">Q</option>
                            <option value="R">R</option>
                            <option value="S">S</option>
                            <option value="T">T</option>
                            <option value="U">U</option>
                            <option value="V">V</option>
                            <option value="W">W</option>
                            <option value="X">X</option>
                            <option value="Y">Y</option>
                            <option value="Z">Z</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="filterStatus">Filter by Status:</label>
                        <select id="filterStatus">
                            <option value="">All Status</option>
                            <option value="present">Present</option>
                            <option value="absent">Absent</option>
                        </select>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <h3 id="totalRecords">0</h3>
                        <p>Total Records</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="totalPresent">0</h3>
                        <p>Present</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="totalAbsent">0</h3>
                        <p>Absent</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="totalInClass">0</h3>
                        <p>Total in Selected Class</p>
                    </div>
                </div>

                <div class="table-actions">
                    <button id="printBtn" class="btn btn-secondary">Print Records</button>
                </div>

                <div id="recordsTable"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
